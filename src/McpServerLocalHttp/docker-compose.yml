services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.29.0
    container_name: azurite
    command: azurite --loose --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    healthcheck:
      disable: true

volumes:
  azurite_data: